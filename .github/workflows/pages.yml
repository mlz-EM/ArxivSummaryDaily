name: pages
on:
  schedule:
    # Runs at 12:00 PM Beijing Time (UTC+8) from Monday to Friday
    - cron: '0 4 * * 1-5'
  # Or you can trigger it manually
  workflow_dispatch:

jobs:
  build:
    concurrency:
      group: arxivsummary-data-main
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target repo (personal-site)
        uses: actions/checkout@v4
        with:
          repository: mlz-EM/personal-site
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: personal-site

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Bootstrap JSON state from personal-site
        run: |
          mkdir -p data
          if [ ! -s data/arXivDaily.json ] && [ -f personal-site/src/data/arXivDaily.json ]; then
            cp personal-site/src/data/arXivDaily.json data/arXivDaily.json
          fi
          if [ ! -s data/jobsDaily.json ] && [ -f personal-site/src/data/jobsDaily.json ]; then
            cp personal-site/src/data/jobsDaily.json data/jobsDaily.json
          fi

      - name: Get pip cache dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
          
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install package
        run: pip install -e .

      - name: Make Configuration
        run: |
          cp ./config/settings.example.py ./config/settings.py
          sed -i '1i import os' ./config/settings.py
          sed -i 's/"YOUR_API_HERE"/os.getenv("LLM_API_KEY")/' ./config/settings.py
      
      - name: Build the arXiv data
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: arxivsummary

      - name: Build the Job data
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: jobsummary

      - name: Commit database files to main repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data
          git commit -m "Update database tracking files" || echo "No database changes"
          git push origin main

      - name: Copy JSON feed files to personal-site/src/data
        run: |
          cp ./data/*Daily.json personal-site/src/data/

      - name: Commit and push to personal-site
        run: |
          cd personal-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/arXivDaily.json
          git add src/data/jobsDaily.json
          git commit -m "Update JSON feeds from arXiv/jobsDaily run ${{ github.run_id }}" || echo "No changes to commit"
          git push
